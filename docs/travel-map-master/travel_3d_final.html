<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Pink Express - Final 3D Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff00ff;
            --secondary: #00e5ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body,
        html {
            height: 100%;
            background-color: var(--bg);
            color: #fff;
            overflow: hidden;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px 30px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            z-index: 100;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5);
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .cam-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .cam-btn:hover {
            background: var(--accent);
            color: #fff;
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            z-index: 100;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 255, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 0, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 255, 0);
            }
        }

        #loading {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 1.2rem;
            letter-spacing: 5px;
            font-weight: 300;
        }
    </style>
</head>

<body>
    <div id="loading">INITIALIZING PINK ENGINE...</div>
    <div class="badge">
        <div class="pulse"></div>ORACLE PINK EXPRESS
    </div>
    <div id="canvas-container"></div>
    <div class="hud">
        <div class="hud-item">
            <div class="label">Location</div>
            <div id="status" class="value">Awaiting Data...</div>
        </div>
        <div class="hud-item">
            <div class="label">Battery</div>
            <div id="battery" class="value">--%</div>
        </div>
        <div class="hud-item">
            <div class="label">Coordinates</div>
            <div id="location" class="value">0.0, 0.0</div>
        </div>
        <div class="hud-item"><button id="toggleCam" class="cam-btn">Toggle View</button></div>
    </div>

    <script
        type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- EMBEDDED DATA ---
        const csvData = `updated,lat,lon,battery,locality
2026-02-28 08:00:00,18.7883,98.9853,100,Chiang Mai Station
2026-02-28 08:15:00,18.681,99.100,98,Lamphun Crossing
2026-02-28 08:30:00,18.450,99.250,95,Khuntan Tunnel
2026-02-28 09:00:00,18.281,99.469,92,Lampang Station
2026-02-28 09:30:00,18.000,99.700,88,Den Chai Hills
2026-02-28 10:00:00,17.618,100.088,84,Uttaradit Forest
2026-02-28 10:30:00,17.200,100.150,80,Phrom Phiram Plains
2026-02-28 11:00:00,16.8183,100.2647,78,Phitsanulok Station`;

        let scene, camera, renderer, controls;
        let train, trainCurve, pathPoints = [];
        let smokeParticles = [], trainLabel;
        let isCinematic = true;
        let trainIdx = 0;
        let currentLabelText = "";
        const animationSpeed = 0.005; // Significant reduction for a relaxing feel
        const cameraFollowLerp = 0.05;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 50, 300);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(50, 40, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xff00ff, 0x00e5ff, 0.7);
            scene.add(hemiLight);

            const grid = new THREE.GridHelper(500, 100, 0x222222, 0x111111);
            scene.add(grid);

            // Floor
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.9, roughness: 0.1 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            parseAndInitialize();

            document.getElementById('toggleCam').addEventListener('click', () => {
                isCinematic = !isCinematic;
            });

            animate();
        }

        function createLabel(text, color = "#ff00ff") {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0, 0, 512, 128);
            ctx.font = 'bold 44px Outfit, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = color; ctx.shadowBlur = 15; ctx.fillStyle = color;
            ctx.fillText(text, 256, 64);
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
            sprite.scale.set(10, 2.5, 1);
            return sprite;
        }

        function parseAndInitialize() {
            Papa.parse(csvData, {
                header: true, skipEmptyLines: true,
                complete: function (res) {
                    const data = res.data;
                    const startLat = 18.7883, startLon = 98.9853, scale = 800;
                    pathPoints = data.map(row => ({
                        x: (parseFloat(row.lon) - startLon) * scale,
                        y: 0.5,
                        z: (startLat - parseFloat(row.lat)) * scale,
                        battery: row.battery,
                        place: row.locality
                    }));

                    trainCurve = new THREE.CatmullRomCurve3(pathPoints.map(p => new THREE.Vector3(p.x, p.y, p.z)));

                    createRails();
                    createDetailedTrain();
                    createStations();
                    createAtmosphere();

                    document.getElementById('loading').style.display = 'none';
                }
            });
        }

        function createRails() {
            const railMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 });
            const sleeperMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const railDist = 0.6;

            const leftPoints = trainCurve.getPoints(1000).map((p, i, arr) => {
                const next = arr[i + 1] || p;
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(next, p).normalize(), new THREE.Vector3(0, 1, 0)).normalize().multiplyScalar(railDist);
                return p.clone().add(side);
            });
            const rightPoints = trainCurve.getPoints(1000).map((p, i, arr) => {
                const next = arr[i + 1] || p;
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(next, p).normalize(), new THREE.Vector3(0, 1, 0)).normalize().multiplyScalar(railDist);
                return p.clone().sub(side);
            });

            scene.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(leftPoints), 1000, 0.08, 8, false), railMat));
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(rightPoints), 1000, 0.08, 8, false), railMat));

            const points = trainCurve.getPoints(1500);
            for (let i = 0; i < points.length - 1; i += 20) {
                const s = new THREE.Mesh(new THREE.BoxGeometry(2, 0.15, 0.5), sleeperMat);
                s.position.copy(points[i]);
                s.lookAt(points[i + 1]); s.rotation.y += Math.PI / 2;
                scene.add(s);
            }
        }

        function createDetailedTrain() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xff69b4, metalness: 0.8, roughness: 0.1 });
            const black = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 });

            const locomotive = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1, 3.5), mat); body.position.y = 0.8; locomotive.add(body);
            const boiler = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 2.8, 16), mat); boiler.rotation.x = Math.PI / 2; boiler.position.set(0, 1, 0.5); locomotive.add(boiler);
            const cab = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 1.2), mat); cab.position.set(0, 1.4, -0.8); locomotive.add(cab);
            const chimney = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 0.7, 12), black); chimney.position.set(0, 1.8, 1.2); chimney.name = "chimney"; locomotive.add(chimney);

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff })); head.position.set(0, 1.2, 1.7); locomotive.add(head);
            const pl = new THREE.PointLight(0xffffff, 50, 10); pl.position.set(0, 1.2, 2); locomotive.add(pl);

            for (let x of [-0.7, 0.7]) for (let z of [-1.2, 0, 1.2]) {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16), black); w.rotation.z = Math.PI / 2; w.position.set(x, 0.4, z); w.name = "wheel"; locomotive.add(w);
            }
            group.add(locomotive);

            for (let i = 1; i <= 3; i++) {
                const car = new THREE.Group(); car.position.z = -i * 4.2;
                const cBody = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.2, 3.8), mat); cBody.position.y = 1; car.add(cBody);
                const roof = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 4), black); roof.position.y = 1.65; car.add(roof);
                for (let x of [-0.6, 0.6]) for (let z of [-1.4, 1.4]) {
                    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.2, 12), black); w.rotation.z = Math.PI / 2; w.position.set(x, 0.3, z); w.name = "wheel"; car.add(w);
                }
                group.add(car);
            }

            trainLabel = createLabel("ORACLE PINK", "#ff00ff"); trainLabel.position.y = 5; group.add(trainLabel);
            train = group; scene.add(train);
        }

        function createStations() {
            const stations = [{ n: "CHIANG MAI", lat: 18.7883, lon: 98.9853 }, { n: "LAMPANG", lat: 18.281, lon: 99.469 }, { n: "PHITSANULOK", lat: 16.8183, lon: 100.2647 }];
            stations.forEach(s => {
                const x = (s.lon - 98.9853) * 800; const z = (18.7883 - s.lat) * 800;
                const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 12, 8), new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 2 }));
                tower.position.set(x, 6, z); scene.add(tower);
                const label = createLabel(s.n, "#00e5ff"); label.position.set(x, 15, z); scene.add(label);
            });
        }

        function createAtmosphere() {
            const treeGeo = new THREE.ConeGeometry(2, 10, 8);
            const treeMat = new THREE.MeshStandardMaterial({ color: 0x114411, roughness: 0.9 });
            const trunkGeo = new THREE.CylinderGeometry(0.4, 0.5, 3);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x2b1d0e });

            for (let i = 0; i < pathPoints.length; i += 3) {
                const p = pathPoints[i];
                for (let j = 0; j < 4; j++) {
                    const side = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 30);
                    const tree = new THREE.Group();
                    const leaves = new THREE.Mesh(treeGeo, treeMat); leaves.position.y = 5; leaves.scale.setScalar(0.7 + Math.random() * 0.6);
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat); trunk.position.y = 1.5;
                    tree.add(leaves); tree.add(trunk);
                    tree.position.set(p.x + side, 0, p.z + (Math.random() - 0.5) * 15);
                    scene.add(tree);
                }
            }
        }

        function updateSmoke() {
            if (Math.random() > 0.6) {
                const chimney = train.getObjectByName("chimney");
                if (chimney) {
                    const smoke = new THREE.Mesh(new THREE.SphereGeometry(0.2 + Math.random() * 0.3, 8, 8), new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.6 }));
                    const worldPos = new THREE.Vector3(); chimney.getWorldPosition(worldPos);
                    smoke.position.copy(worldPos); scene.add(smoke);
                    smokeParticles.push({ mesh: smoke, life: 1.0, vx: (Math.random() - 0.5) * 0.05, vy: 0.1 + Math.random() * 0.1, vz: (Math.random() - 0.5) * 0.05 });
                }
            }
            for (let i = smokeParticles.length - 1; i >= 0; i--) {
                const s = smokeParticles[i]; s.life -= 0.01;
                s.mesh.position.x += s.vx; s.mesh.position.y += s.vy; s.mesh.position.z += s.vz;
                s.mesh.scale.multiplyScalar(1.02); s.mesh.material.opacity = s.life * 0.6;
                if (s.life <= 0) { scene.remove(s.mesh); smokeParticles.splice(i, 1); }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (train && trainCurve) {
                const progress = (trainIdx % pathPoints.length) / pathPoints.length;
                const pos = trainCurve.getPointAt(progress);
                const next = trainCurve.getPointAt((progress + 0.001) % 1);
                train.position.copy(pos); train.lookAt(next);

                updateSmoke();
                train.traverse(obj => { if (obj.name === "wheel") obj.rotation.x += 0.25; });

                const pInfo = pathPoints[Math.floor(progress * pathPoints.length) % pathPoints.length];
                if (pInfo.place !== currentLabelText) {
                    currentLabelText = pInfo.place;
                    document.getElementById('status').innerText = pInfo.place;
                    train.remove(trainLabel);
                    trainLabel = createLabel(pInfo.place, "#ff00ff");
                    trainLabel.position.y = 5; train.add(trainLabel);
                }

                if (isCinematic) {
                    const worldOffset = new THREE.Vector3(0, 10, -30).applyMatrix4(train.matrixWorld);
                    camera.position.lerp(worldOffset, cameraFollowLerp);
                    camera.lookAt(train.position.clone().add(new THREE.Vector3(0, 3, 0)));
                    controls.enabled = false;
                } else { controls.enabled = true; }

                document.getElementById('battery').innerText = `${pInfo.battery}%`;
                document.getElementById('location').innerText = `${pos.x.toFixed(0)}, ${pos.z.toFixed(0)}`;
                trainIdx += animationSpeed;
            }
            if (controls.enabled) controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
